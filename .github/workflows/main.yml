# .github/workflows/deploy.yml
name: Deploy to Railway (End of Day)

on:
  schedule:
    - cron: '0 17 * * 1-5'  # 5 PM weekdays (UTC)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check for commits today
        id: check
        run: |
          COMMITS=$(git log --since="midnight" --oneline | wc -l)
          echo "commit_count=$COMMITS" >> $GITHUB_OUTPUT

      - name: Deploy to Railway
        if: steps.check.outputs.commit_count > 0
        run: npx @railway/cli@latest up --service your-service-name
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
